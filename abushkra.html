<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>דוח כספי 2025 - מי עירון בע"מ</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --paper: #ffffff;
      --soft: #f5f7fb;
      --brand: #0f766e;
      --brand-2: #1d4ed8;
      --danger: #b42318;
      --good: #15803d;
      --gold: #b7791f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      background: var(--soft);
      color: var(--ink);
      line-height: 1.55;
    }

    a { color: inherit; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .nav {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-weight: 800;
      color: var(--brand);
    }

    .brand span {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .links a {
      text-decoration: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 8px 11px;
      font-size: 13px;
      color: #334155;
    }

    .hero {
      background: linear-gradient(135deg, #0f766e 0%, #12325c 72%);
      color: #fff;
      padding: 54px 0 34px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 30px;
      align-items: end;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero p { margin: 0; max-width: 740px; color: #dbeafe; font-size: 18px; }
    .hero-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
